<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f4f4; 
        }

        header { 
            background: #333; 
            color: #fff; 
            padding: 1rem; 
            text-align: center; 
        }

        nav a { 
            color: white; 
            margin: 0 10px; 
            text-decoration: none; 
        }

        section { 
            background: #b3dfbb; 
            padding: 20px; 
            margin-top: 10px; 
            border-radius: 8px; 
        }

    </style>
</head>

<body>

<header>
    <h1>Your Plant</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="page2.html">About the Project</a>
    </nav>
</header>

<section>
    <h2>Live Plant Data</h2>

    <div class="data-box"> Your plant's current moisture level is: <span id="moisture">Loading...</span></div>
    <div class="data-box"> Your plant was last watered on: <span id="watered">Loading...</span></div>
    
</section>

<script>
async function fetchData() {
    try {
        const res = await fetch('http://localhost:3000/data');
        const data = await res.json();

        document.getElementById('moisture').innerText = data.moisture + "%";
        document.getElementById('watered').innerText = data.lastWatered || "Not yet";
    } catch (err) {
        console.error(err);
    }
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
